[build]
  command = "cd 'frontend/financial web' && npm install && npm run build"
  publish = "frontend/financial web/dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[functions]
  node_bundler = "esbuild"
  # This ensures the backend folder (with your models/index.js) is included
  external_node_modules = ["express", "mongoose", "serverless-http"]
  included_files = ["backend/**"]
